# Deploys the site to Cloudflare on every push to main. This replaced
# relying on Cloudflare's own Git-integration build pipeline, which was
# unreliable and often took 5-9+ minutes just to start (see project
# history for details) — this workflow runs the exact same `wrangler
# deploy` command manually used throughout the project's setup, on
# GitHub's infrastructure instead, which has been fast and consistent.
#
# EDIT: needs a repo secret named CLOUDFLARE_API_TOKEN (Workers Edit
# permission) set at github.com/stockcrab/lowcountry-shine/settings/secrets/actions
name: Deploy to Cloudflare

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Deploy via Wrangler
        run: npx wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
